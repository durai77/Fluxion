name: CI/CD

on:
  push:
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main

      - name: Backend npm audit
        run: cd backend-hybrid && npm audit --audit-level=high || true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Backend
        run: cd backend-hybrid && npm install

      - name: Frontend
        run: cd frontend-complete && npm install

  build:
    needs: [security, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: docker build -t fluxion-backend ./backend-hybrid || true
      - run: docker build -t fluxion-webrtc ./backend-webrtc || true
      - run: docker build -t fluxion-redaction ./backend-hybrid/redaction-service || true